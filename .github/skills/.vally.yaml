paths:
  skills: ["skills/"]
  evals:
    - skill-authoring/evals/
    - pipeline-troubleshooting/evals/
    - markdown-token-optimizer/evals/
    - sensei/evals/
    - generate-sdk-locally/evals/
    - sdk-release/evals/
    - apiview-feedback-resolution/evals/
    - prepare-release-plan/evals/
  results: results/
  evalFilenames: ["eval.yaml", "*.eval.yaml"]

environments:
  azsdk-mcp:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args: ["run", "--project", "../../tools/azsdk-cli/Azure.Sdk.Tools.Cli", "--", "start"]
        timeout: 30000
        env:
          AZSDKTOOLS_AGENT_TESTING: "false"
          AZSDKTOOLS_COLLECT_TELEMETRY: "false"

# p0: Gate CI, p1: Nightly, p2: Exploratory/Only local
suites:
  ci-gate:
    filter: { priority: [p0] }
  nightly:
    filter: { priority: [p0, p1] }
  local:
    filter: { priority: [p0, p1, p2] }
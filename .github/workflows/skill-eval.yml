name: Skill Evaluations

on:
  push:
    branches: [main]
    paths:
      - '.github/skills/**'
      - '.vally.yaml'
  pull_request:
    paths:
      - '.github/skills/**'
      - '.vally.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-skills:
    name: Skill Compliance Check (Vally lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Vally CLI
        run: npm install -g @microsoft/vally-cli

      - name: Lint skills
        run: vally lint .

  run-evals:
    name: Run Skill Evaluations (Vally eval)
    runs-on: ubuntu-latest
    needs: check-skills
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if skill files changed
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            if git diff --name-only "$BASE_SHA"...HEAD | grep -q "^\.github/skills/"; then
              echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
            else
              echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
              echo "No skill file changes detected in PR — skipping evals"
            fi
          elif git diff --name-only HEAD~1 HEAD | grep -q "^\.github/skills/"; then
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          else
            echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
            echo "No skill file changes detected — skipping evals"
          fi

      - uses: actions/setup-node@v5
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        with:
          node-version: '20'

      - name: Install Vally CLI
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        run: npm install -g @microsoft/vally-cli

      - name: Run evaluations
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        continue-on-error: true
        run: |
          mkdir -p .vally/results
          areas=$(ls -d .github/skills/*/ 2>/dev/null | xargs -I{} basename {} | paste -sd, -)
          if [ -n "$areas" ]; then
            vally eval --tag "priority=p0" --tag "area=${areas}" --output-dir ".vally/results"
          else
            echo "No skills found — skipping"
          fi

      - name: Upload eval results
        if: always() && steps.changes.outputs.SHOULD_RUN == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eval-results-${{ github.run_id }}
          path: .vally/results/
          retention-days: 30

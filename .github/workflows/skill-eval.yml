name: Skill Evaluations

on:
  push:
    branches: [main]
    paths:
      - '.github/skills/**'
      - '.vally.yaml'
      - '.npmrc'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - '.github/skills/**'
      - '.vally.yaml'
      - '.npmrc'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check-skills:
    name: Skill Compliance Check (Vally lint)
    runs-on: ubuntu-latest
    environment: AzureSDKEngKeyVault
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - uses: azure/login@v2
        with:
          client-id: 5786d1fb-187e-4ca9-9a81-ab89ea278986
          tenant-id: 72f988bf-86f1-41af-91ab-2d7cd011db47
          subscription-id: a18897a6-7e44-457d-9260-f2854c0aca42

      - uses: ./eng/common/actions/login-to-github
        with:
          token-owners: microsoft

      - name: Configure GitHub Packages registry
        run: |
          npm config set "@microsoft:registry" "https://npm.pkg.github.com"
          npm config set "//npm.pkg.github.com/:_authToken" "${{ env.GH_TOKEN }}"

      - name: Install Vally CLI
        run: npm install -g @microsoft/vally-cli

      - name: Lint skills
        run: vally lint

  run-evals:
    name: Run Skill Evaluations (Vally eval)
    runs-on: ubuntu-latest
    environment: AzureSDKEngKeyVault
    needs: check-skills
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if skill files changed
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            if git diff --name-only "$BASE_SHA"...HEAD | grep -q "^\.github/skills/"; then
              echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
            else
              echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
              echo "No skill file changes detected in PR — skipping evals"
            fi
          elif git diff --name-only HEAD~1 HEAD | grep -q "^\.github/skills/"; then
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          else
            echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
            echo "No skill file changes detected — skipping evals"
          fi

      - uses: actions/setup-node@v5
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        with:
          node-version: '20'

      - uses: azure/login@v2
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        with:
          client-id: 5786d1fb-187e-4ca9-9a81-ab89ea278986
          tenant-id: 72f988bf-86f1-41af-91ab-2d7cd011db47
          subscription-id: a18897a6-7e44-457d-9260-f2854c0aca42

      - uses: ./eng/common/actions/login-to-github
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        with:
          token-owners: microsoft

      - name: Configure GitHub Packages registry
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        run: |
          npm config set "@microsoft:registry" "https://npm.pkg.github.com"
          npm config set "//npm.pkg.github.com/:_authToken" "${{ env.GH_TOKEN }}"

      - name: Install Vally CLI
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        run: npm install -g @microsoft/vally-cli

      - name: Run evaluations
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .vally/results
          for eval_file in .github/skills/*/eval.yaml; do
            if [ -f "$eval_file" ]; then
              skill_name=$(basename "$(dirname "$eval_file")")
              echo "=== Running evals for $skill_name ==="
              vally eval -e "$eval_file" --output-dir ".vally/results/${skill_name}" || true
            fi
          done

      - name: Upload eval results
        if: always() && steps.changes.outputs.SHOULD_RUN == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eval-results-${{ github.run_id }}
          path: .vally/results/
          retention-days: 30
